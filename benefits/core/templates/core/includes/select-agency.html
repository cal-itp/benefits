{% load i18n %}
<div class="d-grid gap-2 mt-lg-5">
  <form id="{{ form.id }}" method="{{ form.method }}">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-lg btn-primary" type="submit">{% translate "Next" %}</button>
  </form>
</div>

{% csrf_token %}
<script nonce="{{ request.csp_nonce }}">
  // a lot of this is copy/pasta from core/template/core/includes/form.html
  // TODO: figure out how to share/consolidate
  ready(function() {
    const form = document.querySelector("#{{ form.id }}");

    let button = document.querySelector("#{{ form.id }} button[type=submit]");
    if (!button) {
      button = document.querySelector("button[type=submit][form={{ form.id }}]")
    }

    const select = document.querySelector("#{{ form.id }} select");

    // this listener is a (kinda corny) way of customizing the headline text
    // after a user has selected a transit agency, but before they submit the form
    select.addEventListener("change", function () {
      // this dismisses the stale error message when an agency is selected for the first time after clicking Next prematurely
      // i'm surprised its needed
      select.setCustomValidity("");

      const idx = select.selectedIndex
      const span = document.querySelector('.discrete-span')
      // if we decide to actually take this tack, i'll figure out why our own translations arent loaded
      const hmmm = gettext("public transit") // gettext("January")
      span.innerText = idx === 0 ? hmmm : select[idx].innerText
    });

    {% if form.use_custom_validity %}
        const validate = function(inputElement) {
          inputElement.setCustomValidity(""); // clearing message sets inputElement.validity.customError back to false

          const valid = inputElement.checkValidity();

          if (!valid) {
            inputElement.setCustomValidity(inputElement.dataset.customValidity);
          }
        }

        button.addEventListener("click", function(e) {
          // revalidate all fields
          document.querySelectorAll("[data-custom-validity]").forEach((element) => {
            if (element) {
              validate(element);
            }
          });
        });

    {% endif %}

  })
</script>
