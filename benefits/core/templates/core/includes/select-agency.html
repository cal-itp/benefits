<div class="d-grid gap-2 mt-lg-5">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input class="btn btn-lg btn-primary" type="submit" value="Next">
  </form>
</div>

{% csrf_token %}
<script nonce="{{ request.csp_nonce }}">
  // this feels brittle
  const select = document.querySelector("#id_enroll")
  select.addEventListener("change", function () {
    const slug = select.options[select.selectedIndex].value ?? ''
    window.location = `/${slug}`
  });
</script>
