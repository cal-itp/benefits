{% load i18n %}

<div class="box container mt-lg-5">
  <p class="p fs-6 fw-normal mb-lg-3">
    {% blocktranslate trimmed with count=active_agencies|length %}
      Ride across {{ count }} active agencies (and growing!)
    {% endblocktranslate %}
  </p>
  <div class="row">
    {% for agency in active_agencies %}
      <!-- TODO: remove to stop simulating more agencies -->
      {% for letter in 'Jumboization'|make_list %}
        <div class="col">
          <!-- TODO: account for *new* standard dimensions? -->
          <img src="{{ agency.logo_small_url }}"
               width="52"
               height="36"
               alt="{% blocktranslate with agency=agency.short_name %}{{ agency }} logo{% endblocktranslate %}">
        </div>
      {% endfor %}
    {% endfor %}
  </div>
</div>
