name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - chore/gh-action-apply # TODO: remove!
    tags:
      # pre-release tag
      - "202[3-9].[0-9][0-9].[0-9]+-rc[0-9]+"
      # release tags
      - "202[3-9].[0-9][0-9].[0-9]+"

defaults:
  run:
    shell: bash

env:
  # this ternary returns the name of the deployment environment (see https://docs.github.com/en/actions/learn-github-actions/expressions#example)
  ENV_NAME: github.ref_type != 'tag' && 'dev' || contains(github.ref, '-rc') && 'test' || 'prod'

permissions:
  id-token: write
  contents: read

concurrency:
  group: $ENV_NAME
  cancel-in-progress: true

jobs:
  # tests-ui:
  #   uses: ./.github/workflows/tests-ui.yml
  #   if: github.ref_type == 'tag'

  # tests-pytest:
  #   uses: ./.github/workflows/tests-pytest.yml
  #   if: github.ref_type == 'tag'

  # check-migrations-and-messages:
  #   uses: ./.github/workflows/check-migrations-and-messages.yml
  #   if: github.ref_type == 'tag'

  # check-dynamic-version:
  #   uses: ./.github/workflows/check-dynamic-version.yml
  #   if: github.ref_type == 'tag'

  deploy:
    runs-on: ubuntu-latest
    # needs:
    #   [
    #     tests-ui,
    #     tests-pytest,
    #     check-migrations-and-messages,
    #     check-dynamic-version,
    #   ]
    # if: (!cancelled())
    environment: "dev" # TODO: how to reference$ENV_NAME?
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: .github/workflows/.python-version
          cache: pip
          cache-dependency-path: "**/pyproject.toml"

      - name: Write python packages to file
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install pipdeptree
          pip install -e .
          pipdeptree
          pipdeptree >> benefits/static/requirements.txt

      - name: Write commit SHA to file
        run: echo "${{ github.sha }}" >> benefits/static/sha.txt

      # - name: Docker Login to GitHub Container Registry
      #   uses: docker/login-action@v4
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Set up Docker Buildx
      #   id: buildx
      #   uses: docker/setup-buildx-action@v4

      # - name: Cache Parameters
      #   id: cache_params
      #   run: |
      #     CACHE_SCOPE="cal-itp"
      #     MAIN_BRANCH_REF="refs/heads/main"

      #     echo "cache_from_args=type=gha,scope=${CACHE_SCOPE},ref=${MAIN_BRANCH_REF}" >> $GITHUB_OUTPUT
      #     echo "cache_to_args=type=gha,scope=${CACHE_SCOPE},mode=max,ref=${MAIN_BRANCH_REF}" >> $GITHUB_OUTPUT

      # - name: Build, tag, and push image to GitHub Container Registry
      #   uses: docker/build-push-action@v7
      #   with:
      #     builder: ${{ steps.buildx.outputs.name }}
      #     build-args: GIT-SHA=${{ github.sha }}
      #     cache-from: ${{ steps.cache_params.outputs.cache_from_args }}
      #     cache-to: ${{ steps.cache_params.outputs.cache_to_args }}
      #     context: .
      #     file: appcontainer/Dockerfile
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      # # deploy application service
      # - name: Deploy to Azure Web App
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: ${{ vars.AZURE_WEBAPP_NAME }}
      #     images: ghcr.io/${{ github.repository }}:${{ github.sha }}
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      # begin setup to deploy container app
      - name: Log in to azure using federated identity credentials
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_SP_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SP_SUBSCRIPTION_ID }}

      - name: Setup terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.5

      - name: Initialize terraform and select workspace
        working-directory: terraform
        run: ./init.sh "$ENV_NAME"

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SP_SUBSCRIPTION_ID }}
          TF_VAR_CONTAINER_TAG: 2b7a7515bb23ff60d01a4a20c16fbb7d3a8d590e # ${{ github.sha }}
          TF_VAR_DEVSECOPS_OBJECT_ID: ${{ secrets.TF_VAR_DEVSECOPS_OBJECT_ID }}
          TF_VAR_ENGINEERING_GROUP_OBJECT_ID: ${{ secrets.TF_VAR_ENGINEERING_GROUP_OBJECT_ID }}
        run: terraform apply -input=false -lock-timeout=5m

  release:
    needs: deploy
    if: ${{ github.ref_type == 'tag' && !contains(github.ref, '-rc') }}
    runs-on: ubuntu-latest
    permissions:
      # https://github.com/softprops/action-gh-release#permissions
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: false
          generate_release_notes: true
